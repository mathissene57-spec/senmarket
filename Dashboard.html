<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A1A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SenMarket -- Dashboard Vendeur</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap&display=swap" rel="stylesheet">
<style>
/* ================================================================
   DESIGN TOKENS -- Production Grade
   ================================================================ */
:root {
  /* Brand */
  --g:      #00C96B;
  --gd:     #006B3C;
  --gm:     #00A65A;
  --gg:     rgba(0,201,107,.12);
  --gold:   #F5B800;
  --goldd:  rgba(245,184,0,.15);
  --red:    #FF4757;
  --redd:   rgba(255,71,87,.12);
  --blue:   #3D8EFF;
  --blued:  rgba(61,142,255,.12);

  /* Surfaces */
  --bg:     #0A1A0F;
  --bg2:    #111F16;
  --bg3:    #172618;
  --bg4:    #1E3020;
  --card:   #142018;
  --bdr:    rgba(255,255,255,.08);
  --bdrl:   rgba(255,255,255,.04);

  /* Text */
  --txt:    #F2F7F4;
  --txt2:   #B0C4B8;
  --mut:    #6A8572;
  --light:  #3D5449;

  /* Radius – FIX: valeurs semantiques */
  --r-sm:   10px;
  --r-md:   14px;
  --r-lg:   18px;
  --r-xl:   22px;
  --r-2xl:  26px;
  --r-pill: 100px;

  /* Shadows */
  --sh:   0 2px 12px rgba(0,0,0,.4);
  --shl:  0 8px 32px rgba(0,0,0,.5);
  --shg:  0 4px 20px rgba(0,201,107,.25);
  --shr:  0 4px 20px rgba(255,71,87,.25);

  /* Motion */
  --ease:   cubic-bezier(.16,1,.3,1);
  --ease-o: cubic-bezier(0,0,.3,1);
  --dur-fast: 150ms;
  --dur-base: 250ms;
  --dur-slow: 350ms;

  /* Layout */
  --nav:  60px;
  --tab:  64px;
  --safe: env(safe-area-inset-bottom, 0px);
  --safeT: env(safe-area-inset-top, 0px);

  /* Z-index stack – FIX: centralisé */
  --z-sticky:  50;
  --z-nav:     100;
  --z-sheet:   200;
  --z-confirm: 300;
  --z-toast:   400;
}

/* ================================================================
RESET – Production
================================================================ */
*, *::before, *::after {
margin: 0; padding: 0;
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
}

html {
height: 100%;
overscroll-behavior: none;
/* FIX: font-display swap via CSS */
}

body {
font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
background: var(--bg);
color: var(--txt);
min-height: 100%;
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
/* FIX: padding-bottom safe pour tab bar */
padding-bottom: calc(var(--tab) + var(--safe));
}

a { text-decoration: none; color: inherit; }

button {
font-family: inherit;
cursor: pointer;
border: none;
background: none;
outline: none;
/* FIX: touch-action sur tous les boutons */
touch-action: manipulation;
}

input, select, textarea {
font-family: inherit;
/* FIX: evite zoom iOS sur focus */
font-size: max(16px, 1em);
-webkit-appearance: none;
touch-action: manipulation;
}

/* FIX: Input font-size override seulement pour UI compacts */
.fi { font-size: 15px !important; }

img { max-width: 100%; display: block; }

/* ================================================================
ACCESSIBILITY
================================================================ */
.sr-only {
position: absolute; width: 1px; height: 1px;
padding: 0; margin: -1px; overflow: hidden;
clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* Focus visible pour navigation clavier */
:focus-visible {
outline: 2px solid var(--g);
outline-offset: 2px;
}

/* ================================================================
TOP NAVBAR
================================================================ */
#topnav {
position: fixed;
top: 0; left: 0; right: 0;
height: 60px;
z-index: var(--z-nav);
padding: 0 16px 0 20px;
display: flex;
align-items: center;
justify-content: space-between;
background: var(--bg);
border-bottom: 1px solid var(--bdr);
transition: box-shadow var(--dur-base) var(--ease);
/* FIX: will-change pour perf */
will-change: box-shadow;
}
#topnav.up { box-shadow: 0 4px 24px rgba(0,0,0,.5); }

.tn-left { display: flex; align-items: center; gap: 10px; }
.tn-avatar {
width: 36px; height: 36px; border-radius: 50%;
background: linear-gradient(135deg, var(--gd), var(--gm));
display: flex; align-items: center; justify-content: center;
font-size: 17px;
border: 2px solid rgba(0,201,107,.3);
flex-shrink: 0;
}
.tn-greet-name { font-size: 15px; font-weight: 700; line-height: 1.2; }
.tn-greet-sub  { font-size: 11px; color: var(--mut); }

.tn-actions { display: flex; align-items: center; gap: 8px; }
.tn-btn {
width: 38px; height: 38px;
border-radius: var(--r-sm);
background: var(--bg2);
border: 1px solid var(--bdr);
display: flex; align-items: center; justify-content: center;
font-size: 17px; position: relative;
transition: all var(--dur-base) var(--ease);
will-change: transform;
}
.tn-btn:active { transform: scale(.92); background: var(--bg3); }

.tn-notif {
position: absolute; top: -4px; right: -4px;
width: 16px; height: 16px;
background: var(--red); color: #fff;
font-size: 9px; font-weight: 700;
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
border: 2px solid var(--bg);
/* FIX: transition sur le badge */
transition: transform var(--dur-base) var(--ease);
}
.tn-notif.hide { transform: scale(0); }

/* ================================================================
BOTTOM TAB BAR
================================================================ */
#bottomnav {
position: fixed;
bottom: 0; left: 0; right: 0;
height: calc(var(--tab) + var(--safe));
z-index: var(--z-nav);
background: var(--bg2);
border-top: 1px solid var(--bdr);
display: flex;
align-items: flex-start;
justify-content: space-around;
padding-top: 8px;
padding-bottom: var(--safe);
/* FIX: -webkit-backdrop-filter */
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
will-change: transform;
}

.tab {
flex: 1;
display: flex; flex-direction: column; align-items: center; gap: 3px;
padding: 4px 6px;
cursor: pointer;
border-radius: var(--r-md);
transition: all var(--dur-base) var(--ease);
position: relative;
-webkit-user-select: none; user-select: none;
}
.tab:active { transform: scale(.88); }

.tab-ico {
font-size: 21px; line-height: 1;
transition: transform var(--dur-base) var(--ease);
will-change: transform;
}
.tab-lbl { font-size: 10px; font-weight: 600; color: var(--mut); transition: color var(--dur-base); }

.tab.active .tab-ico { transform: scale(1.12); }
.tab.active .tab-lbl { color: var(--g); }
.tab.active::before {
content: '';
position: absolute; top: -8px; left: 50%;
transform: translateX(-50%);
width: 28px; height: 3px;
background: var(--g);
border-radius: 0 0 3px 3px;
}

.tab-dot {
position: absolute; top: 0; right: calc(50% - 16px);
width: 7px; height: 7px;
background: var(--red); border-radius: 50%;
border: 2px solid var(--bg2);
transition: transform var(--dur-base) var(--ease);
}
.tab-dot.hide { transform: scale(0); }

/* ================================================================
PAGES
================================================================ */
.page {
display: none;
padding-top: 60px;
min-height: 100vh;
/* FIX: contain pour perf layout */
contain: layout style;
}
.page.active { display: block; }

/* ================================================================
DASHBOARD BANNER
================================================================ */
.dash-banner {
margin: 12px 16px;
background: linear-gradient(135deg, var(--gd) 0%, #003d21 60%, #001a0e 100%);
border-radius: var(--r-xl);
padding: 20px;
position: relative;
overflow: hidden;
}
.db-inner   { position: relative; z-index: 1; }
.db-label   { font-size: 11px; font-weight: 700; color: rgba(0,201,107,.8); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.db-title   { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 4px; }
.db-title .gold { color: var(--gold); }
.db-sub     { font-size: 12px; color: rgba(255,255,255,.6); margin-bottom: 16px; }
.db-pulse   { display: flex; align-items: center; gap: 8px; }
.pulse-dot  {
width: 8px; height: 8px; border-radius: 50%;
background: var(--g);
animation: pulseDot 1.5s ease-in-out infinite;
}
@keyframes pulseDot {
0%,100% { opacity: 1; transform: scale(1); }
50%      { opacity: .4; transform: scale(1.5); }
}
.db-pulse-txt { font-size: 12px; color: rgba(255,255,255,.7); }

/* ================================================================
KPI CARDS
================================================================ */
.kpi-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
padding: 0 16px;
margin-bottom: 16px;
}
.kpi-card {
background: var(--card);
border: 1px solid var(--bdr);
border-radius: var(--r-lg);
padding: 16px;
position: relative; overflow: hidden;
transition: transform var(--dur-base) var(--ease);
cursor: pointer;
will-change: transform;
}
.kpi-card:active { transform: scale(.97); }
.kpi-card::before {
content: '';
position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.kpi-g::before { background: var(--g); }
.kpi-y::before { background: var(--gold); }
.kpi-b::before { background: var(--blue); }
.kpi-r::before { background: var(--red); }

.kpi-icon  { font-size: 22px; margin-bottom: 10px; line-height: 1; }
.kpi-label { font-size: 11px; color: var(--mut); font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
.kpi-value { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; line-height: 1; }
.kpi-value.g { color: var(--g); }
.kpi-value.y { color: var(--gold); }
.kpi-value.b { color: var(--blue); }
.kpi-value.r { color: var(--red); }
.kpi-change { font-size: 11px; margin-top: 4px; font-weight: 600; display: flex; align-items: center; gap: 3px; }
.up   { color: var(--g); }
.down { color: var(--red); }

/* ================================================================
BUTTON STYLES - PRODUCTION
================================================================ */
.btn-p {
width: 100%; padding: 16px;
border-radius: var(--r-lg);
background: var(--g); color: #000;
font-size: 16px; font-weight: 700;
border: none; cursor: pointer; font-family: inherit;
display: flex; align-items: center; justify-content: center; gap: 8px;
transition: all var(--dur-base) var(--ease);
box-shadow: var(--shg);
margin-top: 8px;
will-change: transform;
}
.btn-p:active   { background: var(--gm); transform: scale(.98); }
.btn-p:disabled {
opacity: .5; cursor: not-allowed;
pointer-events: none;
}

</style>
</head>
<body>

<!-- TOP NAVBAR -->
<nav id="topnav">
  <div class="tn-left">
    <div class="tn-avatar">👤</div>
    <div>
      <div class="tn-greet-name">Bienvenue</div>
      <div class="tn-greet-sub">Vendeur</div>
    </div>
  </div>
  <div class="tn-actions">
    <button class="tn-btn" title="Notifications">🔔
      <span class="tn-notif">3</span>
    </button>
    <button class="tn-btn" title="Paramètres">⚙️</button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main id="app" class="page active">
  <div style="padding: 16px;">
    <h1 style="font-family: 'Playfair Display'; font-size: 24px; margin-bottom: 16px;">Dashboard Vendeur</h1>
    <p>Contenu du dashboard à venir...</p>
  </div>
</main>

<!-- BOTTOM TAB BAR -->
<nav id="bottomnav">
  <div class="tab active">
    <div class="tab-ico">📊</div>
    <div class="tab-lbl">Dashboard</div>
    <div class="tab-dot hide"></div>
  </div>
  <div class="tab">
    <div class="tab-ico">📦</div>
    <div class="tab-lbl">Produits</div>
    <div class="tab-dot hide"></div>
  </div>
  <div class="tab">
    <div class="tab-ico">📋</div>
    <div class="tab-lbl">Commandes</div>
    <div class="tab-dot"></div>
  </div>
  <div class="tab">
    <div class="tab-ico">👤</div>
    <div class="tab-lbl">Profil</div>
    <div class="tab-dot hide"></div>
  </div>
</nav>

<script>
// Production-grade state management
const appState = {
  currentPage: 'dashboard',
  isSubmitting: false,
  toasts: []
};

// Tab navigation
document.querySelectorAll('.tab').forEach((tab, idx) => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});

// Close any overlay with ESC key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    console.log('ESC pressed - ready for overlay management');
  }
});

console.log('Dashboard loaded successfully');
</script>

</body>
</html>
