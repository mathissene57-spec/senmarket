<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0A1A0F">
<title>SenMarket -- Connexion Vendeur</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:opsz,wght@9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0A1A0F;color:#F2F7F4;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-ico{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#006B3C,#00A65A);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px rgba(0,201,107,.25)}
.logo-txt{font-family:'Playfair Display',serif;font-size:24px;font-weight:900}
.logo-txt span{color:#F5B800}
.card{background:#111F16;border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:clamp(24px,5vw,40px);width:100%;max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,.4)}
.card-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;margin-bottom:6px;text-align:center}
.card-sub{font-size:14px;color:#6A8572;text-align:center;margin-bottom:28px;line-height:1.6}
.tabs{display:flex;background:#0A1A0F;border-radius:10px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;color:#6A8572;cursor:pointer;text-align:center;transition:all .2s;border:none;font-family:inherit;background:transparent}
.tab-btn.on{background:#172618;color:#00C96B;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:700;color:#6A8572;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.fi{width:100%;padding:14px 16px;background:#172618;border:1.5px solid rgba(255,255,255,.08);border-radius:12px;font-size:16px;color:#F2F7F4;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.fi:focus{border-color:#00C96B;box-shadow:0 0 0 3px rgba(0,201,107,.12)}
.fi::placeholder{color:#3D5449}
.btn-p{width:100%;padding:16px;border-radius:14px;background:#00C96B;color:#000;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:8px;box-shadow:0 4px 20px rgba(0,201,107,.25)}
.btn-p:active{background:#00A65A;transform:scale(.98)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;pointer-events:none}
.btn-s{width:100%;padding:14px;border-radius:14px;background:transparent;color:#B0C4B8;border:1.5px solid rgba(255,255,255,.08);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;transition:all .2s}
.btn-s:active{border-color:#00C96B;color:#00C96B}
.msg{padding:12px 16px;border-radius:10px;font-size:13px;font-weight:500;margin-top:12px;display:none;text-align:center}
.msg.ok{background:rgba(0,201,107,.12);border:1px solid rgba(0,201,107,.25);color:#00C96B}
.msg.err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.25);color:#FF4757}
.msg.show{display:block}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#3D5449;font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.btn-wa{width:100%;padding:14px;border-radius:14px;background:#25D366;color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.btn-wa:active{background:#20BA5A;transform:scale(.98)}
.forgot{text-align:center;margin-top:16px;font-size:13px;color:#6A8572;cursor:pointer}
.forgot a{color:#00C96B;font-weight:600;text-decoration:none}
.back-link{text-align:center;margin-top:20px;font-size:13px;color:#6A8572}
.back-link a{color:#00C96B;font-weight:600;text-decoration:none}
.strength-bar{height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:6px;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s}
</style>
</head>
<body>

<div class="logo">
  <div class="logo-ico">🛒</div>
  <span class="logo-txt">Sen<span>Market</span></span>
</div>

<div class="card">
  <div class="card-title">Espace Vendeur</div>
  <div class="card-sub">Connectez-vous pour acceder a votre dashboard</div>

  <div class="tabs">
    <button class="tab-btn on" id="tabLogin" onclick="switchTab('login')">Se connecter</button>
    <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">Creer un compte</button>
  </div>

  <!-- LOGIN FORM -->

  <div id="loginForm">
    <div class="fg">
      <label>Email</label>
      <input class="fi" type="email" id="lEmail" placeholder="awa@email.com" autocomplete="email">
    </div>
    <div class="fg">
      <label>Mot de passe</label>
      <input class="fi" type="password" id="lMdp" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-p" id="btnLogin" onclick="login()">Se connecter</button>
    <div class="divider">ou</div>
    <button class="btn-wa" onclick="loginMagicLink()">✉️ Lien magique par email</button>
    <div class="forgot"><a onclick="resetPassword()">Mot de passe oublie ?</a></div>
  </div>

  <!-- REGISTER FORM -->

  <div id="registerForm" style="display:none">
    <div class="fg">
      <label>Nom complet</label>
      <input class="fi" type="text" id="rNom" placeholder="Awa Diallo" autocomplete="name">
    </div>
    <div class="fg">
      <label>Email</label>
      <input class="fi" type="email" id="rEmail" placeholder="awa@email.com" autocomplete="email">
    </div>
    <div class="fg">
      <label>Mot de passe</label>
      <input class="fi" type="password" id="rMdp" placeholder="Minimum 8 caracteres" autocomplete="new-password" oninput="evalMdp(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="sFill" style="width:0%"></div></div>
    </div>
    <button class="btn-p" id="btnRegister" onclick="register()">Creer mon compte</button>
  </div>

  <div class="msg" id="authMsg"></div>
</div>

<div class="back-link"><a href="/index.html">← Retour a la marketplace</a></div>

<script>
(function() {
'use strict';

var SB_URL  = 'https://imccuesdgyaiytsibtqn.supabase.co';
var SB_ANON = 'Sb_publishable_wCVPT8GmJ9TfwR2IDpUbAw_ywCZmp5i';
var _client = null;

function getClient() {
  if (!_client && window.supabase) {
    _client = window.supabase.createClient(SB_URL, SB_ANON);
  }
  return _client;
}

/* Redirect if already logged in */
window.addEventListener('DOMContentLoaded', function() {
  var c = getClient();
  if (!c) return;
  c.auth.getSession().then(function(res) {
    if (res.data && res.data.session) {
      window.location.href = '/tableau_de_bord.html';
    }
  });
});

window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('tab' + (tab === 'login' ? 'Login' : 'Register')).classList.add('on');
  document.getElementById('loginForm').style.display    = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  hideMsg();
};

function showMsg(txt, type) {
  var el = document.getElementById('authMsg');
  el.textContent = txt;
  el.className = 'msg ' + type + ' show';
}
function hideMsg() {
  document.getElementById('authMsg').className = 'msg';
}
function setLoading(btnId, loading, text) {
  var btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? '⏳ Chargement...' : text;
}

window.login = function() {
  var email = document.getElementById('lEmail').value.trim();
  var mdp   = document.getElementById('lMdp').value;
  if (!email || !mdp) { showMsg('Email et mot de passe requis', 'err'); return; }

  setLoading('btnLogin', true, 'Se connecter');
  hideMsg();

  getClient().auth.signInWithPassword({ email: email, password: mdp })
    .then(function(res) {
      setLoading('btnLogin', false, 'Se connecter');
      if (res.error) { showMsg(res.error.message || 'Identifiants incorrects', 'err'); return; }
      showMsg('Connexion reussie ! Redirection...', 'ok');
      setTimeout(function() { window.location.href = '/tableau_de_bord.html'; }, 800);
    })
    .catch(function(err) {
      setLoading('btnLogin', false, 'Se connecter');
      showMsg('Erreur reseau. Reessayez.', 'err');
    });
};

window.register = function() {
  var nom   = document.getElementById('rNom').value.trim();
  var email = document.getElementById('rEmail').value.trim();
  var mdp   = document.getElementById('rMdp').value;
  if (!nom || !email) { showMsg('Nom et email requis', 'err'); return; }
  if (mdp.length < 8) { showMsg('Mot de passe minimum 8 caracteres', 'err'); return; }

  setLoading('btnRegister', true, 'Creer mon compte');
  hideMsg();

  getClient().auth.signUp({
    email: email, password: mdp,
    options: { data: { full_name: nom, role: 'vendor' } }
  }).then(function(res) {
    setLoading('btnRegister', false, 'Creer mon compte');
    if (res.error) { showMsg(res.error.message, 'err'); return; }
    showMsg('Compte cree ! Verifiez votre email pour confirmer.', 'ok');
  }).catch(function() {
    setLoading('btnRegister', false, 'Creer mon compte');
    showMsg('Erreur. Reessayez.', 'err');
  });
};

window.loginMagicLink = function() {
  var email = document.getElementById('lEmail').value.trim();
  if (!email) { showMsg('Entrez votre email d\'abord', 'err'); return; }
  getClient().auth.signInWithOtp({ email: email })
    .then(function(res) {
      if (res.error) { showMsg(res.error.message, 'err'); return; }
      showMsg('Lien envoye a ' + email + ' !', 'ok');
    });
};

window.resetPassword = function() {
  var email = document.getElementById('lEmail').value.trim();
  if (!email) { showMsg('Entrez votre email d\'abord', 'err'); return; }
  getClient().auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  }).then(function() {
    showMsg('Email de reinitialisation envoye !', 'ok');
  });
};

window.evalMdp = function(v) {
  var s = 0;
  if (v.length >= 8) s++; if (v.length >= 12) s++;
  if (/[A-Z]/.test(v)) s++; if (/[0-9]/.test(v)) s++; if (/[^A-Za-z0-9]/.test(v)) s++;
  var lvls = [{c:'#FF4757',p:'20%'},{c:'#F97316',p:'40%'},{c:'#F5B800',p:'60%'},{c:'#00C96B',p:'80%'},{c:'#006B3C',p:'100%'}];
  var l = Math.min(s, 4);
  var f = document.getElementById('sFill');
  f.style.width = lvls[l].p; f.style.background = lvls[l].c;
};

})();
</script>

</body>
</html>
